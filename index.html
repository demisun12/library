<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DemiSun Library</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="header">
        <h1>DemiSun Library</h1>
    </div>
    <div class="books">
        <button type="button" id="plus">&#65291;</button>
    </div>

    <dialog id="addBook">
        <h2>New Book Information</h2>
        <form>
            <p>
                <label for="book-title">TITLE</label> <br>
                <input type="text" id="book-title" name="book-title" required>
            </p>
            <p>
                <label for="book-author">AUTHOR</label><br>
                <input type="text" id="book-author" name="book-author" required>
            </p>
            <p>
                <label for="book-pages">PAGES</label><br>
                <input type="number" id="book-pages" name="book-pages" required>
            </p>
            <p>
                <label for="book-read">ALREADY READ?</label> 
                <input type="checkbox" id="book-read" name="book-read">
            </p>
            <div class="btns">
                <button type="submit" id="confirm">Add Book</button>
                <button type="button" id="cancelBtn">Cancel</button>
            </div>
        </form>
    </dialog>

    <script src="js.js"></script>
</body>
</html>
