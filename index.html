<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DemiSun Library</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="header">
        <h1>DemiSun Library</h1>
    </div>
    <div class="books">
        <button type="button" id="plus">&#65291;</button>
    </div>

    <dialog id="addBook">
        <h2>New Book Information</h2>
        <form>
            <label for="book-title">Title:</label>
            <input type="text" id="book-title" name="book-title" required>
            <label for="book-author">Author:</label>
            <input type="text" id="book-author" name="book-author" required>
            <label for="book-pages">Pages:</label>
            <input type="number" id="book-pages" name="book-pages" required>
            <label for="book-read">Read:</label>
            <input type="checkbox" id="book-read" name="book-read">
            <button type="submit">Add Book</button>
            <button type="button" id="cancelBtn">Cancel</button>
        </form>
    </dialog>

    <script src="js.js"></script>
</body>
</html>
